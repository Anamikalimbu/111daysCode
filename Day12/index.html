<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TIC TAC TOE</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="scanlines"></div>

  <div class="container">
    <header>
      <h1 class="title">TIC<span class="accent">✕</span>TAC<span class="accent">○</span>TOE</h1>
      <p class="subtitle">// ARCADE EDITION //</p>
    </header>

    <!-- Mode selector -->
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="human">
        <span class="mode-icon">👥</span>
        <span class="mode-label">VS HUMAN</span>
      </button>
      <button class="mode-btn" data-mode="ai">
        <span class="mode-icon">🤖</span>
        <span class="mode-label">VS AI</span>
      </button>
    </div>

    <!-- Difficulty (shown only in AI mode) -->
    <div class="difficulty-row" id="difficulty-row">
      <span class="diff-label">DIFFICULTY:</span>
      <div class="diff-btns">
        <button class="diff-btn" data-diff="easy">EASY</button>
        <button class="diff-btn active" data-diff="medium">MEDIUM</button>
        <button class="diff-btn" data-diff="hard">HARD</button>
      </div>
    </div>

    <div class="scoreboard">
      <div class="score-card" id="score-x">
        <span class="player-label" id="label-x">PLAYER X</span>
        <span class="score-value" id="x-score">0</span>
      </div>
      <div class="score-card draws">
        <span class="player-label">DRAWS</span>
        <span class="score-value" id="draw-score">0</span>
      </div>
      <div class="score-card" id="score-o">
        <span class="player-label" id="label-o">PLAYER O</span>
        <span class="score-value" id="o-score">0</span>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-text" id="status">PLAYER <span id="current-player">X</span>'S TURN</div>
    </div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="controls">
      <button class="btn" id="restart-btn">↺ NEW GAME</button>
      <button class="btn btn-secondary" id="reset-score-btn">⊘ RESET SCORES</button>
    </div>
  </div>

  <!-- Win overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <div class="overlay-icon" id="overlay-icon"></div>
      <div class="overlay-title" id="overlay-title">WINNER!</div>
      <div class="overlay-msg" id="overlay-msg">PLAYER X WINS!</div>
      <button class="btn overlay-btn" id="overlay-btn">▶ PLAY AGAIN</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
